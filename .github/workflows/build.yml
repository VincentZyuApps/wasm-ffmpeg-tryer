name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  check:
    name: Check commit message
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.flags.outputs.should_build }}
      should_release: ${{ steps.flags.outputs.should_release }}
      version: ${{ steps.flags.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse commit message
        id: flags
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          MSG="$COMMIT_MSG"

          VERSION="v$(grep '"version"' package.json | head -1 | sed 's/.*"\(.*\)".*/\1/')"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "📦 Version: $VERSION"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BUILD=false
          RELEASE=false

          if echo "$MSG" | grep -qi "build release"; then
            BUILD=true
            RELEASE=true
          elif echo "$MSG" | grep -qi "build action"; then
            BUILD=true
          fi

          echo "should_build=$BUILD" >> "$GITHUB_OUTPUT"
          echo "should_release=$RELEASE" >> "$GITHUB_OUTPUT"
          echo "📋 Flags: build=$BUILD release=$RELEASE"

  build:
    name: Build
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  deploy-gh-pages:
    name: Deploy to GitHub Pages
    needs: [check, build]
    if: needs.check.outputs.should_build == 'true' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Configure Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-cf-pages:
    name: Deploy to Cloudflare Pages
    needs: [check, build]
    if: needs.check.outputs.should_build == 'true' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for Cloudflare Pages
        env:
          VITE_BASE_URL: /
        run: npm run build

      - name: Deploy
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: wasm-ffmpeg-tryer
          directory: dist

  release:
    name: Create GitHub Release
    needs: [check, build, deploy-gh-pages, deploy-cf-pages]
    if: needs.check.outputs.should_release == 'true' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Create release package
        run: |
          VERSION="${{ needs.check.outputs.version }}"
          cd dist
          zip -r ../wasm-ffmpeg-tryer-${VERSION}.zip .
          cd ..
          echo "📦 Created: wasm-ffmpeg-tryer-${VERSION}.zip"
          ls -lh wasm-ffmpeg-tryer-${VERSION}.zip

      - name: Delete existing release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.check.outputs.version }}"
          gh release delete "$VERSION" --yes --cleanup-tag 2>/dev/null || echo "No existing release"
          sleep 2

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.check.outputs.version }}"
          REPO="${{ github.repository }}"
          sed -e "s|__VERSION__|${VERSION}|g" \
              -e "s|__REPO__|${REPO}|g" \
              -e "s|__BUILD_TIME__|$(date -u '+%Y-%m-%d %H:%M UTC')|g" \
              .github/release_template.md > release_notes.md
          gh release create "$VERSION" \
            --title "wasm-ffmpeg-tryer ${VERSION}" \
            --notes-file release_notes.md \
            --latest \
            wasm-ffmpeg-tryer-${VERSION}.zip
